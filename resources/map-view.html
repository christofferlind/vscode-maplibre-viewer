<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src ${cspSource} 'unsafe-inline'; script-src 'nonce-${nonce}' ${cspSource}; img-src ${cspSource} http: https: data: blob:; connect-src ${cspSource} http: https: wss: data: blob:; font-src ${cspSource} data:; worker-src ${cspSource} blob:;">
	<title>MapLibre Map</title>
	<link href="${maplibreCssUri}" rel="stylesheet" />
	<link href="${mainCssUri}" rel="stylesheet" />
</head>
<body>
	<div class="main-container">
		<!-- Search container at the top - static positioning -->
		<div id="search-container" class="search-container" style="display: none;">
			<div class="search-input-wrapper">
				<input type="text" id="search-input" class="search-input" placeholder="Search places..." autocomplete="off" />
				<button id="search-clear-btn" class="search-clear-btn" title="Clear search" style="display: none;">×</button>
			</div>
			<div id="search-results" class="search-results"></div>
		</div>
		<!-- Map container fills remaining space -->
		<div class="map-wrapper">
			<div id="map"></div>
			<div id="loading-overlay" class="loading-overlay">
				<span>Loading map...</span>
			</div>
			<div id="error-overlay" class="error-overlay">
				<div class="error-icon">⚠️</div>
				<div class="error-title">Map Load Error</div>
				<div id="error-message" class="error-message"></div>
			</div>
		</div>
	</div>
	<script nonce="${nonce}">
		// Global monkey-patching of Event.prototype to prevent MapLibre (or any other script)
		// from swallowing the contextmenu event. VS Code's native context menu relies on
		// this event bubbling up to the document without being prevented.
		// This must run before MapLibre is loaded.
		(function() {
			const originalPreventDefault = Event.prototype.preventDefault;
			Event.prototype.preventDefault = function() {
				if (this.type === 'contextmenu') {
					return;
				}
				return originalPreventDefault.apply(this, arguments);
			};

			const originalStopPropagation = Event.prototype.stopPropagation;
			Event.prototype.stopPropagation = function() {
				if (this.type === 'contextmenu') {
					return;
				}
				return originalStopPropagation.apply(this, arguments);
			};
		})();
	</script>
	<script nonce="${nonce}" src="${maplibreJsUri}"></script>
	<script nonce="${nonce}" src="${mapUtilsJsUri}"></script>
	<script nonce="${nonce}" src="${mapCoreJsUri}"></script>
	<script nonce="${nonce}" src="${testApiJsUri}"></script>
	<script nonce="${nonce}" src="${mapOverlaysJsUri}"></script>
	<script nonce="${nonce}" src="${mapNavigationJsUri}"></script>
	<script nonce="${nonce}" src="${mapSearchJsUri}"></script>
	<script nonce="${nonce}" src="${mainJsUri}"></script>
	<script nonce="${nonce}">
		// Configure MapLibre to use inline worker (Blob URL) to avoid cross-origin issues in VS Code webview
		(function() {
			var workerBase64 = '${maplibreWorkerBase64}';
			var workerCode = atob(workerBase64);
			var workerBlob = new Blob([workerCode], { type: 'application/javascript' });
			var workerUrl = URL.createObjectURL(workerBlob);
			maplibregl.setWorkerUrl(workerUrl);
		})();
		
		// Configuration from extension
		var config = {
			mapStyleUrl: '${mapStyleUrl}',
			geocodingApiKey: '${geocodingApiKey}',
			photonSearchUrl: '${photonSearchUrl}',
			enableSearch: "${enableSearch}" === "true",
			searchResultsTransparency: parseInt("${searchResultsTransparency}", 10),
			flyToDuration: parseInt("${flyToDuration}", 10),
			initialViewState: null
		};
		
		// Initialize the application
		window.Main.initialize(config);
	</script>
</body>
</html>
